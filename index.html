<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ JugaBet Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #000000;
  --bg-card: #0a0f0a;
  --bg-card-hover: #111a11;
  --accent-green: #c8e618;
  --accent-green-bright: #d4f020;
  --accent-green-dim: #9ab800;
  --accent-blue: #2196f3;
  --accent-blue-bright: #42a5f5;
  --text-main: #e8edf5;
  --text-dim: #7a8ba8;
  --border-subtle: rgba(200, 230, 24, 0.08);
  --glow-green: 0 0 30px rgba(200, 230, 24, 0.3);
  --glow-blue: 0 0 20px rgba(33, 150, 243, 0.3);
  --navy: #1a2744;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(200, 230, 24, 0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#particleCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

/* HEADER */
.header {
  text-align: center;
  padding: 24px 0 16px;
}

.logo-img {
  height: 52px;
  width: auto;

  margin-bottom: 6px;
}

.subtitle {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent-green);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-top: 2px;
  text-shadow: 0 0 20px rgba(200, 230, 24, 0.3);
}

/* MATCH PANEL */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 16px;
  padding: 28px 24px;
  margin-top: 24px;
  position: relative;
  overflow: hidden;
}

.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
}

.panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 3px;
  color: var(--accent-green);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.panel-title::before {
  content: '⚡';
  font-size: 1.2rem;
}

/* MATCH NUMBER */
.match-number-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}

.match-label {
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  min-width: 100px;
}

.match-number-display {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--accent-green);
  background: rgba(200, 230, 24, 0.06);
  border: 1px solid rgba(200, 230, 24, 0.15);
  border-radius: 10px;
  padding: 4px 20px;
  min-width: 70px;
  text-align: center;
}

/* SELECTIONS */
.selection-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 20px;
}

@media (max-width: 600px) {
  .selection-grid { grid-template-columns: 1fr; }
}

.selection-group > label {
  display: block;
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: var(--text-main);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 1px;
  transition: all 0.2s;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chip:hover {
  background: rgba(200, 230, 24, 0.08);
  border-color: rgba(200, 230, 24, 0.25);
}

.chip.selected {
  background: rgba(200, 230, 24, 0.15);
  border-color: var(--accent-green);
  color: var(--accent-green);
  box-shadow: 0 0 14px rgba(200, 230, 24, 0.15);
}

.chip.game-chip.selected {
  background: rgba(33, 150, 243, 0.15);
  border-color: var(--accent-blue);
  color: var(--accent-blue-bright);
  box-shadow: 0 0 14px rgba(33, 150, 243, 0.15);
}

.chip .game-logo {
  width: 22px;
  height: 22px;
  object-fit: contain;
  border-radius: 4px;
}

/* POINTS INPUT */
.points-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
}

.points-input {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--accent-green);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  padding: 10px 16px;
  border-radius: 10px;
  width: 110px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}

.points-input:focus {
  border-color: var(--accent-green);
  box-shadow: 0 0 16px rgba(200, 230, 24, 0.15);
}

.points-input::placeholder { color: var(--text-dim); font-size: 1rem; }

/* REGISTER BUTTON */
.btn-register {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-green-dim));
  color: #000000;
}

.btn-register:hover {
  box-shadow: var(--glow-green);
  transform: translateY(-1px);
}

.btn-register:active { transform: scale(0.98); }

.btn-register:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--accent-green);
  color: #000000;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  padding: 12px 28px;
  border-radius: 10px;
  box-shadow: var(--glow-green);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 999;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* SCOREBOARD */
.scoreboard { margin-top: 30px; }

.scoreboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.score-row {
  display: flex;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 10px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.score-row.rank-1 {
  border-color: rgba(200, 230, 24, 0.3);
  background: linear-gradient(135deg, rgba(200, 230, 24, 0.08), var(--bg-card));
}

.score-row.rank-1 .rank-badge {
  background: var(--accent-green);
  color: #000000;
}

.score-row.rank-2 .rank-badge {
  background: rgba(192, 192, 192, 0.2);
  color: #c0c0c0;
}

.score-row.rank-3 .rank-badge {
  background: rgba(205, 127, 50, 0.2);
  color: #cd7f32;
}

.rank-badge {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
  font-weight: 900;
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-dim);
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 16px;
  flex-shrink: 0;
}

.player-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.25rem;
  letter-spacing: 2px;
  flex: 1;
}

.player-wins-detail {
  display: flex;
  gap: 4px;
  margin-right: 12px;
}

.player-wins-detail img {
  width: 18px;
  height: 18px;
  opacity: 0.5;
  border-radius: 3px;
}

.player-points {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--accent-green);
  margin-left: 12px;
}

.player-pts-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-left: 6px;
}

/* HISTORY */
.history-panel { margin-top: 30px; }

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 0.9rem;
}

.history-match {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent-blue-bright);
  background: rgba(33, 150, 243, 0.1);
  padding: 3px 10px;
  border-radius: 6px;
  flex-shrink: 0;
}

.history-winner {
  font-weight: 700;
  color: var(--accent-green);
}

.history-game {
  color: var(--text-dim);
  margin-left: auto;
  font-size: 0.85rem;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.history-game img {
  width: 18px;
  height: 18px;
  border-radius: 3px;
}

.history-points {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--accent-green);
  flex-shrink: 0;
}

.btn-undo {
  background: none;
  border: 1px solid rgba(255, 80, 80, 0.3);
  color: #ff5050;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.btn-undo:hover {
  background: rgba(255, 80, 80, 0.15);
  border-color: #ff5050;
}

/* RESET */
.btn-reset {
  background: none;
  border: 1px solid rgba(255, 80, 80, 0.25);
  color: #ff5050;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 3px;
  padding: 6px 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-reset:hover { background: rgba(255, 80, 80, 0.1); }

/* ANIMATIONS */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.score-row { animation: slideUp 0.3s ease-out both; }
.score-row:nth-child(1) { animation-delay: 0s; }
.score-row:nth-child(2) { animation-delay: 0.05s; }
.score-row:nth-child(3) { animation-delay: 0.1s; }
.score-row:nth-child(4) { animation-delay: 0.15s; }
.score-row:nth-child(5) { animation-delay: 0.2s; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}

.empty-state .dice-big {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.3;
}

.empty-state p {
  font-size: 1rem;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <img id="logoImg" class="logo-img" alt="JugaBet" src="">
    <div class="subtitle">SCOREBOARD</div>
  </div>

  <!-- REGISTER PANEL -->
  <div class="panel">
    <div class="panel-title">REGISTRAR PARTIDA</div>

    <div class="match-number-row">
      <span class="match-label">Partida</span>
      <div class="match-number-display" id="matchNum">1</div>
    </div>

    <div class="selection-grid">
      <div class="selection-group">
        <label>🏆 Ganador</label>
        <div class="chip-row" id="playerChips"></div>
      </div>
      <div class="selection-group">
        <label>🎮 Juego</label>
        <div class="chip-row" id="gameChips"></div>
      </div>
    </div>

    <div class="points-row">
      <span class="match-label">Puntos</span>
      <input type="number" class="points-input" id="pointsInput" placeholder="1" value="1" min="1">
    </div>

    <button class="btn-register" id="btnRegister" disabled>REGISTRAR VICTORIA ⚡</button>
  </div>

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="scoreboard-header">
      <div class="panel-title" style="margin-bottom:0">TABLA DE POSICIONES</div>
      <button class="btn-reset" id="btnReset">RESET</button>
    </div>
    <div id="scoreboardBody"></div>
  </div>

  <!-- HISTORY -->
  <div class="history-panel">
    <div class="panel-title">HISTORIAL DE PARTIDAS</div>
    <div id="historyBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== NEON PARTICLE SYSTEM =====
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const PARTICLE_COUNT = 80;
  const GAMING_SHAPES = ['cross', 'diamond', 'circle', 'triangle', 'square', 'bolt'];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * W;
      this.y = init ? Math.random() * H : H + 20;
      this.size = Math.random() * 6 + 2;
      this.speedX = (Math.random() - 0.5) * 0.6;
      this.speedY = -(Math.random() * 0.8 + 0.15);
      this.opacity = Math.random() * 0.5 + 0.1;
      this.pulseSpeed = Math.random() * 0.02 + 0.008;
      this.pulsePhase = Math.random() * Math.PI * 2;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.02;
      this.shape = GAMING_SHAPES[Math.floor(Math.random() * GAMING_SHAPES.length)];
      // Green hue variations for neon
      const hueShift = Math.random() * 30 - 10; // 60-90 range (green-yellow)
      this.hue = 72 + hueShift;
      this.glowSize = this.size * (2 + Math.random() * 3);
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.rotation += this.rotSpeed;
      this.pulsePhase += this.pulseSpeed;
      const pulse = Math.sin(this.pulsePhase) * 0.3 + 0.7;
      this.currentOpacity = this.opacity * pulse;

      if (this.y < -30 || this.x < -30 || this.x > W + 30) this.reset(false);
    }

    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = this.currentOpacity;

      // Neon glow
      ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, 0.8)`;
      ctx.shadowBlur = this.glowSize;
      ctx.fillStyle = `hsla(${this.hue}, 90%, 55%, 1)`;
      ctx.strokeStyle = `hsla(${this.hue}, 100%, 70%, 0.9)`;
      ctx.lineWidth = 1;

      const s = this.size;

      switch (this.shape) {
        case 'cross':
          ctx.beginPath();
          ctx.rect(-s/4, -s, s/2, s*2);
          ctx.rect(-s, -s/4, s*2, s/2);
          ctx.fill();
          break;
        case 'diamond':
          ctx.beginPath();
          ctx.moveTo(0, -s);
          ctx.lineTo(s*0.7, 0);
          ctx.lineTo(0, s);
          ctx.lineTo(-s*0.7, 0);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          break;
        case 'circle':
          ctx.beginPath();
          ctx.arc(0, 0, s*0.7, 0, Math.PI*2);
          ctx.fill();
          break;
        case 'triangle':
          ctx.beginPath();
          ctx.moveTo(0, -s);
          ctx.lineTo(s*0.87, s*0.5);
          ctx.lineTo(-s*0.87, s*0.5);
          ctx.closePath();
          ctx.stroke();
          break;
        case 'square':
          ctx.strokeRect(-s*0.6, -s*0.6, s*1.2, s*1.2);
          break;
        case 'bolt':
          ctx.beginPath();
          ctx.moveTo(s*0.3, -s);
          ctx.lineTo(-s*0.4, s*0.1);
          ctx.lineTo(s*0.1, s*0.1);
          ctx.lineTo(-s*0.3, s);
          ctx.lineTo(s*0.4, -s*0.1);
          ctx.lineTo(-s*0.1, -s*0.1);
          ctx.closePath();
          ctx.fill();
          break;
      }

      ctx.restore();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }

  // Floating connecting lines between nearby particles
  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.strokeStyle = `hsla(72, 100%, 55%, ${0.08 * (1 - dist/120)})`;
          ctx.shadowColor = 'hsla(72, 100%, 60%, 0.3)';
          ctx.shadowBlur = 6;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    drawConnections();
    requestAnimationFrame(animate);
  }
  animate();
})();

const PLAYERS = ['Churra', 'Dracul1nx', 'Belenya', 'Fara', 'Wedge'];

const GAMES = [
  {
    name: 'Valorant',
    icon: '💣',
    logo: 'https://upload.wikimedia.org/wikipedia/commons/f/fc/Valorant_logo_-_pink_color_version.svg'
  },
  {
    name: 'Fall Guys',
    icon: '👑',
    logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/5/5e/Fall_Guys_logo.svg/1200px-Fall_Guys_logo.svg.png'
  },
  {
    name: 'Tetris',
    icon: '🧱',
    logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/7/7d/Tetris_logo.svg/1200px-Tetris_logo.svg.png'
  },
  {
    name: 'Bomb Party',
    icon: '💣',
    logo: null
  },
  {
    name: 'Crab Game',
    icon: '🦀',
    logo: 'https://cdn.cloudflare.steamstatic.com/steam/apps/1782210/capsule_231x87.jpg'
  },
  {
    name: 'Osu',
    icon: '🎯',
    logo: 'https://upload.wikimedia.org/wikipedia/commons/1/1e/Osu%21_Logo_2016.svg'
  }
];

let state = loadState();

function defaultState() {
  return {
    scores: Object.fromEntries(PLAYERS.map(p => [p, 0])),
    history: [],
    matchNum: 1
  };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('jugabet_state_v2'));
    if (s && s.scores && s.history) return s;
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('jugabet_state_v2', JSON.stringify(state));
}

let selectedPlayer = null;
let selectedGame = null;

function gameLogoHTML(game, size = 22) {
  const g = GAMES.find(x => x.name === game);
  if (!g) return '';
  if (g.logo) {
    return `<img class="game-logo" src="${g.logo}" alt="${g.name}" style="width:${size}px;height:${size}px;" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"><span style="display:none">${g.icon}</span>`;
  }
  return `<span style="font-size:${size * 0.8}px">${g.icon}</span>`;
}

function buildChips() {
  const pc = document.getElementById('playerChips');
  const gc = document.getElementById('gameChips');
  pc.innerHTML = PLAYERS.map(p =>
    `<div class="chip player-chip" data-player="${p}">${p}</div>`
  ).join('');
  gc.innerHTML = GAMES.map(g => {
    const logoContent = g.logo
      ? `<img class="game-logo" src="${g.logo}" alt="${g.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"><span style="display:none">${g.icon}</span>`
      : `<span style="font-size:16px">${g.icon}</span>`;
    return `<div class="chip game-chip" data-game="${g.name}">${logoContent}${g.name}</div>`;
  }).join('');

  pc.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    pc.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
    c.classList.add('selected');
    selectedPlayer = c.dataset.player;
    checkReady();
  }));

  gc.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    gc.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
    c.classList.add('selected');
    selectedGame = c.dataset.game;
    checkReady();
  }));
}

function checkReady() {
  document.getElementById('btnRegister').disabled = !(selectedPlayer && selectedGame);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function registerMatch() {
  const pts = parseInt(document.getElementById('pointsInput').value) || 1;

  state.scores[selectedPlayer] = (state.scores[selectedPlayer] || 0) + pts;
  state.history.unshift({
    match: state.matchNum,
    player: selectedPlayer,
    game: selectedGame,
    points: pts
  });
  state.matchNum++;

  saveState();
  render();
  showToast(`⚡ +${pts} pts para ${selectedPlayer}!`);

  selectedPlayer = null;
  selectedGame = null;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('pointsInput').value = '1';
  checkReady();
}

function undoMatch(index) {
  const entry = state.history[index];
  if (!entry) return;
  state.scores[entry.player] = Math.max(0, (state.scores[entry.player] || 0) - entry.points);
  state.history.splice(index, 1);
  if (state.history.length === 0) state.matchNum = 1;
  saveState();
  render();
  showToast(`Partida ${entry.match} eliminada`);
}

function resetAll() {
  if (!confirm('¿Resetear todo el scoreboard?')) return;
  state = defaultState();
  saveState();
  render();
  showToast('Scoreboard reseteado');
}

function render() {
  document.getElementById('matchNum').textContent = state.matchNum;

  const sb = document.getElementById('scoreboardBody');
  const sorted = PLAYERS
    .map(p => ({ name: p, pts: state.scores[p] || 0 }))
    .sort((a, b) => b.pts - a.pts);

  if (sorted.every(s => s.pts === 0)) {
    sb.innerHTML = `<div class="empty-state"><div class="dice-big">🎲</div><p>Registra la primera partida para comenzar</p></div>`;
  } else {
    sb.innerHTML = sorted.map((s, i) => {
      const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
      // Get game icons for this player's wins
      const playerGames = state.history
        .filter(h => h.player === s.name)
        .map(h => gameLogoHTML(h.game, 18));
      
      return `
        <div class="score-row ${rankClass}">
          <div class="rank-badge">${i + 1}</div>
          <div class="player-name">${s.name}</div>
          <div class="player-wins-detail">${playerGames.slice(0, 8).join('')}</div>
          <div class="player-points">${s.pts}</div>
          <div class="player-pts-label">PTS</div>
        </div>
      `;
    }).join('');
  }

  const hb = document.getElementById('historyBody');
  if (state.history.length === 0) {
    hb.innerHTML = `<div class="empty-state"><p style="opacity:0.5">Sin partidas registradas</p></div>`;
  } else {
    hb.innerHTML = state.history.map((h, i) => `
      <div class="history-item">
        <span class="history-match">P${h.match}</span>
        <span class="history-winner">${h.player}</span>
        <span class="history-game">${gameLogoHTML(h.game, 18)} ${h.game}</span>
        <span class="history-points">+${h.points}</span>
        <button class="btn-undo" onclick="undoMatch(${i})">✕</button>
      </div>
    `).join('');
  }
}

buildChips();
render();
document.getElementById('btnRegister').addEventListener('click', registerMatch);
document.getElementById('btnReset').addEventListener('click', resetAll);
</script>
</body>
</html>
